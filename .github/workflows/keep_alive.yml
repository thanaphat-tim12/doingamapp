name: Keep Streamlit App Awake

on:
  schedule:
    # รันทุก 12 ชั่วโมง (ที่เวลา 00:00 และ 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # เปิดให้กดรันด้วยตนเองจากหน้าเว็บ GitHub ได้

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Selenium and Chrome Driver
        run: |
          pip install selenium webdriver-manager
          
      - name: Run Headless Browser to Wake Up Streamlit
        run: |
          python -c '
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from webdriver_manager.chrome import ChromeDriverManager
          from selenium.webdriver.chrome.service import Service

          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          
          # เริ่มต้นบราวเซอร์ Chrome จำลอง
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          print("กำลังเข้าสู่หน้าเว็บเพื่อทำการปลุก...")
          driver.get("https://doingamapp.streamlit.app/")
          # รอให้หน้าเว็บโหลด
          time.sleep(10)
          
          try:
              # ลองหาปุ่ม "Yes, get this app back up!" (หรือที่ใช้ class/text ใกล้เคียง)
              # Streamlit มักจะใช้ปุ่มเพื่อปลุกแอป
              print("กำลังพยายามหาปุ่มปลุกแอป...")
              
              from selenium.webdriver.common.by import By
              from selenium.webdriver.support.ui import WebDriverWait
              from selenium.webdriver.support import expected_conditions as EC
              
              # ค้นหาปุ่มที่มีคำว่า "Yes, get this app back up!" หรือปุ่ม button ทั่วไปในหน้าจอ sleep
              wait = WebDriverWait(driver, 10)
              wakeup_buttons = driver.find_elements(By.XPATH, "//button[contains(text(), 'Yes, get this app back up!') or contains(text(), 'Wake')]")
              
              if wakeup_buttons:
                  print("พบปุ่มปลุกแอปแล้ว กำลังคลิก...")
                  wakeup_buttons[0].click()
                  time.sleep(10) # รอให้แอปปลุกสำเร็จ
              else:
                  # ถ้าไม่เจอปุ่มเฉพาะเจาะจง ให้ลองคลิกบนปุ่มใดๆ ที่โผล่ขึ้นมา
                  buttons = driver.find_elements(By.TAG_NAME, "button")
                  if buttons:
                      print(f"พบปุ่มทั่วไป {len(buttons)} ปุ่ม กำลังลองคลิกปุ่มแรก...")
                      buttons[0].click()
                      time.sleep(10)
                  else:
                      print("ไม่พบปุ่มใดๆ บนหน้าจอ อาจจะตื่นอยู่แล้วหรือโหลดไม่เสร็จ")
          except Exception as e:
              print(f"เกิดข้อผิดพลาดในการคลิกปุ่ม: {e}")
              
          print("เปิดหน้าเว็บสำเร็จ หัวข้อหน้าเว็บคือ:", driver.title)
          driver.quit()
          print("เสร็จสิ้น!")
          '
