name: Keep Streamlit App Awake

on:
  schedule:
    # รันทุก 12 ชั่วโมง (ที่เวลา 00:00 และ 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # เปิดให้กดรันด้วยตนเองจากหน้าเว็บ GitHub ได้

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Selenium and Chrome Driver
        run: |
          pip install selenium webdriver-manager
          
      - name: Run Headless Browser to Wake Up Streamlit
        run: |
          python -c '
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from webdriver_manager.chrome import ChromeDriverManager
          from selenium.webdriver.chrome.service import Service

          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          
          # เริ่มต้นบราวเซอร์ Chrome จำลอง
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          print("กำลังเข้าสู่หน้าเว็บเพื่อทำการปลุก...")
          driver.get("https://doingamapp.streamlit.app/")
          
          # รอ 20 วินาทีเพื่อให้ JavaScript โหลดและเชื่อมต่อ WebSocket ปลุกเซิร์ฟเวอร์เสร็จสมบูรณ์
          time.sleep(20)
          print("เปิดหน้าเว็บสำเร็จ หัวข้อหน้าเว็บคือ:", driver.title)
          driver.quit()
          print("เสร็จสิ้น!")
          '
